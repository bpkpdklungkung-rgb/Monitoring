<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Data Pelayanan</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; }
  .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal { transition: opacity .2s; }
  tr:hover { background-color: #f9fafb; }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">

    <div>
      <h1 class="text-2xl md:text-3xl font-bold">DASHBOARD MONITORING DATA PELAYANAN PBB-P2</h1>
      <p class="text-blue-100 text-sm">Untuk memantau atau melihat alasan penolakan pengajuan berkas pelayanan PBB-P2</p>
      <p class="text-blue-100 text-sm">📊 © 2026 SATYA</p>
    </div>
    <button onclick="openModal('add')" class="mt-3 md:mt-0 bg-white text-blue-700 font-semibold px-5 py-2 rounded-lg shadow hover:bg-blue-50 transition">

<!-- FILTER & SEARCH -->
<section class="container mx-auto px-4 py-5">

    <select id="filterJenis" class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
      <option value="">-- Semua Jenis Pelayanan --</option>
    </select>
    <button onclick="loadData()" class="bg-blue-600 text-white rounded-lg px-4 py-2 hover:bg-blue-700">
      🔄 Refresh
    </button>
  </div>
</section>

<!-- TABLE -->

          <th class="px-3 py-3">Keterangan</th>
          <th class="px-3 py-3 text-center">Aksi</th>

  <p id="infoText" class="text-xs text-gray-500 mt-2"></p>
</section>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg z-50"></div>

<script>
/* ============================================================
   KONFIGURASI — GANTI URL DI BAWAH DENGAN URL WEB APP ANDA
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbxwMRgbEuhTIWq7lfmZjMaCaZ3zcEzS4WJ5IdiCzzppiFQjOk8shPOw-idMhOmQMK_E/exec";

/* ============================================================ */
let allData = [];

document.getElementById('dataForm').addEventListener('submit', submitForm);
document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('filterPPAT').addEventListener('change', renderTable);
document.getElementById('filterJenis').addEventListener('change', renderTable);

async function loadData() {
  try {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="9" class="text-center py-10"><div class="loader w-8 h-8 border-4 border-gray-200 rounded-full mx-auto"></div></td></tr>';
    const res = await fetch(API_URL + "?action=read");
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allData = json.data;
    populateFilters();
    renderTable();
    document.getElementById('infoText').textContent = `Total data: ${allData.length} record`;
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="9" class="text-center py-10 text-red-500">❌ Gagal memuat: ${e.message}</td></tr>`;
  }
}

function populateFilters() {
  const ppatSet = new Set(), jenisSet = new Set();
  allData.forEach(d => { ppatSet.add(d.ppat); jenisSet.add(d.jenisPelayanan); });
  const ppatSel = document.getElementById('filterPPAT');
  const jenisSel = document.getElementById('filterJenis');
  const curP = ppatSel.value, curJ = jenisSel.value;
  ppatSel.innerHTML = '<option value="">-- Masyarakat/Notaris --</option>' +
    [...ppatSet].map(p => `<option ${p===curP?'selected':''}>${p}</option>`).join('');
  jenisSel.innerHTML = '<option value="">-- Semua Jenis Pelayanan --</option>' +
    [...jenisSet].map(j => `<option ${j===curJ?'selected':''}>${j}</option>`).join('');
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fP = document.getElementById('filterPPAT').value;
  const fJ = document.getElementById('filterJenis').value;
  const filtered = allData.filter(d =>
    (!q || (d.nama+d.pemohon+d.nop+d.noPelayanan).toLowerCase().includes(q)) &&
    (!fP || d.ppat === fP) &&
    (!fJ || d.jenisPelayanan === fJ)
  );
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-10 text-gray-500">Tidak ada data</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td class="px-3 py-2 font-mono text-xs">${d.id}</td>
      <td class="px-3 py-2">${d.noPelayanan}</td>
      <td class="px-3 py-2 font-mono text-xs">${d.nop}</td>
      <td class="px-3 py-2 font-semibold">${d.nama}</td>
      <td class="px-3 py-2">${d.pemohon}</td>
      <td class="px-3 py-2"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">${d.ppat}</span></td>
      <td class="px-3 py-2"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">${d.jenisPelayanan}</span></td>
      <td class="px-3 py-2 text-gray-600 text-xs">${d.keterangan || '-'}</td>
      <td class="px-3 py-2 text-center whitespace-nowrap">
        <button onclick='editRow(${JSON.stringify(d)})' class="text-blue-600 hover:underline mr-2">✏️ Edit</button>
        <button onclick="deleteRow('${d.id}')" class="text-red-600 hover:underline">🗑️ Hapus</button>
      </td>
    </tr>`).join('');
}

function openModal(mode, data = {}) {
  document.getElementById('modalTitle').textContent = mode === 'add' ? 'Tambah Data' : 'Edit Data';
  document.getElementById('rowId').value = data.id || '';
  document.getElementById('noPelayanan').value = data.noPelayanan || '';
  document.getElementById('nop').value = data.nop || '';
  document.getElementById('nama').value = data.nama || '';
  document.getElementById('pemohon').value = data.pemohon || '';
  document.getElementById('ppat').value = data.ppat || '';
  document.getElementById('jenisPelayanan').value = data.jenisPelayanan || '';
  document.getElementById('keterangan').value = data.keterangan || '';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function editRow(d) { openModal('edit', d); }

async function submitForm(e) {
  e.preventDefault();
  const payload = {
    id: document.getElementById('rowId').value,
    noPelayanan: document.getElementById('noPelayanan').value,
    nop: document.getElementById('nop').value,
    nama: document.getElementById('nama').value,
    pemohon: document.getElementById('pemohon').value,
    ppat: document.getElementById('ppat').value,
    jenisPelayanan: document.getElementById('jenisPelayanan').value,
    keterangan: document.getElementById('keterangan').value
  };
  const action = payload.id ? 'update' : 'create';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action, data: payload })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    showToast(json.message);
    closeModal();
    loadData();
  } catch (e) { showToast('❌ ' + e.message, true); }
}

async function deleteRow(id) {
  if (!confirm('Yakin ingin menghapus data ini?')) return;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', data: { id } })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    showToast(json.message);
    loadData();
  } catch (e) { showToast('❌ ' + e.message, true); }
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 text-white ${err?'bg-red-600':'bg-green-600'}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

loadData();
</script>
</body>
</html>
